#root{height:100vh;display:flex;flex-direction:column}
.scrollbar::-webkit-scrollbar{width:6px}
.scrollbar::-webkit-scrollbar-track{background:transparent}
.scrollbar::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
.scrollbar::-webkit-scrollbar-thumb:hover{background:#64748b}

.dot-anim span:nth-child(2){animation-delay:0.2s}
.dot-anim span:nth-child(3){animation-delay:0.4s}
.model-btn{border:2px solid transparent;transition:all 0.2s}
.model-btn.active{border-color:currentColor;box-shadow:0 0 12px rgba(99,102,241,0.3)}
textarea{resize:none}
.msg-content p{margin:4px 0}
.msg-content pre{background:#1e293b;padding:8px 12px;border-radius:6px;overflow-x:auto;margin:8px 0;font-size:13px}
.msg-content code{background:#334155;padding:1px 4px;border-radius:3px;font-size:13px}
.msg-content pre code{background:none;padding:0}
@media (max-width:768px){
  body{overflow:auto}
  #root{height:auto;min-height:100vh}
  .hide-mobile{display:none!important}
  #app-root{padding:4px!important}
}
@media (max-width:640px){
  .model-btn{font-size:10px!important;padding:2px 6px!important}
  .model-btn span{display:none}
  textarea{font-size:16px!important}
  .msg-content{font-size:13px!important}
}
</style>
